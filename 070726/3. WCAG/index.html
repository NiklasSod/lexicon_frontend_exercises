<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta 
        name="description" 
        content="Live vy av parkeringsgarage med information om tillgängliga platser och priser."
    >
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <title>Parkeringsgarage - SmartParking Live</title>
</head>
<body>

    <header id="header-section">
        <div class="logo">SmartParking Live</div>
        <nav class="menu-links">
            <a href="#karta">Karta</a>
            <a href="#info">Info</a>
        </nav>
    </header>

    <main id="content-area">
        
        <div class="garage-container">
            <h1>Live-vy: Garageplan A</h1>
            <p>Klicka på en ruta för att se detaljer.</p>
            
            <div class="floor-layout">
                <button 
                    class="spot" 
                    onclick="updateSpot(this, 1)" 
                    aria-label="Car parked"
                    aria-describedby="click-action-take">
                    🚗
                </button>
                <button 
                    class="spot" 
                    onclick="updateSpot(this, 1)" 
                    aria-label="Car parked"
                    aria-describedby="click-action-take">
                    🚗
                </button>
                <button 
                    class="spot" 
                    onclick="updateSpot(this, 0)" 
                    aria-label="Spot is free" 
                    aria-describedby="sidebar-rates click-action-park">
                </button>
                <button 
                    class="spot" 
                    onclick="updateSpot(this, 1)" 
                    aria-label="Car parked"
                    aria-describedby="click-action-take">
                    🚗
                </button>

                <span id="click-action-park" class="sr-only">Click to park</span>
                <span id="click-action-take" class="sr-only">Click to take car</span>
            </div>
        </div>

        <div class="info-sidebar">
            <h2>Rates and Rules</h2>
            <p id="sidebar-rates">Standard rate: $2 per hour. Orange dashed lines indicate the zone boundary.</p>
        </div>

    </main>

    <footer id="footer-area">
        <p>© 2026 SmartParking AB</p>
    </footer>

</body>
</html>
