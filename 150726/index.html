<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="./src/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bilregister</title>
  </head>
  <body>
    <div id="app">

      <!-- HEADER -->
      <header class="flex flex-col sm:flex-row sm:justify-between items-center gap-4 p-5 border-b-2 border-gray-300">
        <p class="text-base sm:text-lg font-medium text-center sm:text-left">
          Bilregister - Hantera din bilsamling
        </p>
        
        <div class="flex gap-2 w-full sm:w-auto justify-center sm:justify-end">
          <button 
            class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded text-sm sm:text-base flex-1 sm:flex-none" 
            id="init-cars">
            Init cars
          </button>
          <button 
            class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded text-sm sm:text-base flex-1 sm:flex-none" 
            id="add-car">
            Add car
          </button>
        </div>
      </header>

      <!-- TABLE -->
       <div class="overflow-x-auto bg-white rounded-lg shadow-md border border-gray-200">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Märke</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Modell</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">År</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Färg</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Åtgärd</th>
                    </tr>
                </thead>
                <tbody id="car-table-body" class="bg-white divide-y divide-gray-200">
                </tbody>
            </table>
        </div>

    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
