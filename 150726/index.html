<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="./src/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bilregister</title>
  </head>
  <body>
    <div id="app">

      <!-- HEADER -->
      <header class="flex flex-col sm:flex-row sm:justify-between items-center gap-4 p-5 border-b-2 border-gray-300">
        <p class="text-base sm:text-lg font-medium text-center sm:text-left">
          Bilregister - Hantera din bilsamling
        </p>
        
        <div class="flex gap-2 w-full sm:w-auto justify-center sm:justify-end">
          <p class="content-center" id="temp-text">Press me -></p>
          <button 
            class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded text-sm sm:text-base flex-1 sm:flex-none" 
            id="init-cars">
            Init cars
          </button>
          <button 
            class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded text-sm sm:text-base flex-1 sm:flex-none" 
            id="add-car">
            Add car
          </button>
        </div>
      </header>

      <!-- TABLE -->
       <div class="overflow-x-auto bg-white rounded-lg shadow-md border border-gray-200">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Brand</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Model</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Year</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Color</th>
                        <th scope="col" class="px-6 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Change</th>
                    </tr>
                </thead>
                <tbody id="car-table-body" class="bg-white divide-y divide-gray-200">
                </tbody>
            </table>
        </div>

        <!-- MODAL ADD / EDIT -->
         <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center hidden">
          
          <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm"></div>

          <div class="relative w-full max-w-md p-6 mx-4 bg-white rounded-xl shadow-xl transition-all transform">
            
            <div class="flex items-center justify-between mb-6">
              <h3 class="text-xl font-semibold text-slate-800">Add a new car</h3>
              <button id="close-modal" class="text-slate-400 hover:text-slate-600 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
              </button>
            </div>

            <form class="space-y-4">
              <div>
                <label class="block mb-1 text-sm font-medium text-slate-700">Brand</label>
                <input type="text" placeholder="Car brand" 
                      class="w-full px-3 py-2 border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm">
              </div>

              <div>
                <label class="block mb-1 text-sm font-medium text-slate-700">Model</label>
                <input type="text" placeholder="Car model" 
                      class="w-full px-3 py-2 border border-slate-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm">
              </div>


              <div class="flex items-center">
                <input type="checkbox" id="terms" 
                      class="w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500">
                <label for="terms" class="ml-2 text-sm text-slate-600">I agree to the terms and conditions</label>
              </div>

              <div class="flex justify-end space-x-3 pt-4 border-t border-slate-100">
                <button type="button" id="cancel-btn" 
                        class="px-4 py-2 text-sm font-medium text-slate-700 bg-white border border-slate-300 rounded-lg hover:bg-slate-50 transition-colors">
                  Cancel
                </button>
                <button type="submit" 
                        class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg hover:bg-blue-700 shadow-sm transition-colors">
                  Submit
                </button>
              </div>
            </form>

          </div>
        </div>

    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
