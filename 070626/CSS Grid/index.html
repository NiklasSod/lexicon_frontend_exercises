<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pen</title>
  </head>
  <body>

    <div class="parking">
      <h1 class="heading">Parkeringshus</h1>
      <div class="grid">

        <div class="top-left-car">
          <div class="carstyle">
            <i class="fas fa-car-alt" style="zoom: 300%"></i>
          </div>
        </div>

        <div class="left-car">
          <div class="carstyle">
            <i class="fas fa-shuttle-van" style="zoom: 300%"></i>
          </div>
        </div>

        <div class="bottom-left-car">
          <div class="carstyle">
            <i class="fas fa-truck" style="zoom: 300%"></i>
          </div>
        </div>

        <div class="road">
          <div class="road-text">
            <h3>&#x2193;</h3>
            <h3>INFART</h3>
            <h3>/</h3>
            <h3>KÖRBANA</h3>
            <h3>&#x2191;</h3>
          </div>
        </div>
        
        <div class="top-right-taxi">
          <div class="carstyle">
            <i class="fas fa-taxi" style="zoom: 300%"></i>
          </div>
        </div>

        <div class="bottom-right-limo">
          <div class="carstyle purple">
            <i class="fas fa-bus" style="zoom: 300%"></i>
          </div>
        </div>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
